<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>RAGNAR API | إدارة البوتات</title>
    <style>
        body {
            background: #0a0f1e;
            color: #00ffcc;
            font-family: monospace;
            display: flex;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            background: #0f1424;
            border: 1px solid #00ffcc33;
            border-radius: 1rem;
            padding: 2rem;
            max-width: 800px;
            width: 100%;
        }
        input, textarea {
            width: 100%;
            padding: 0.5rem;
            margin: 0.5rem 0;
            background: #05070f;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            border-radius: 0.5rem;
        }
        button {
            background: #00ffcc;
            color: #0a0f1e;
            padding: 0.5rem;
            border: none;
            cursor: pointer;
            border-radius: 0.5rem;
        }
        .user-card {
            border: 1px solid #ffcc00;
            padding: 1rem;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>⚡ RAGNAR CONTROL v1.0</h1>
    <p>🔑 <strong>API Endpoint:</strong> /api/bot-runner-data</p>
    <p>🔐 <strong>Master Key:</strong> RAGNAR-BOT-RUNNER-KEY-2025</p>

    <div class="user-card">
        <h3>➕ إضافة / تحديث بوت</h3>
        <input type="text" id="username" placeholder="اسم البوت (مثال: bot1)">
        <input type="text" id="token" placeholder="توكن البوت (من @BotFather)">
        <input type="text" id="owner_id" placeholder="أيدي المالك">
        <input type="text" id="owner_name" placeholder="اسم المالك">
        <textarea id="welcome_message" rows="2" placeholder="رسالة الترحيب"></textarea>
        <textarea id="help_message" rows="2" placeholder="رسالة المساعدة"></textarea>
        <button onclick="addOrUpdateBot()">💾 حفظ البوت</button>
    </div>

    <div>
        <h3>📋 قائمة البوتات المسجلة</h3>
        <pre id="usersList" style="background:#05070f; padding:1rem; border-radius:0.5rem; overflow:auto;">جاري التحميل...</pre>
        <button onclick="fetchUsers()">🔄 تحديث</button>
    </div>
</div>

<script>
    const API_URL = window.location.origin + "/api/bot-runner-data";
    const API_KEY = "RAGNAR-BOT-RUNNER-KEY-2025";

    async function fetchUsers() {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({key: API_KEY})
        });
        const data = await res.json();
        if(data.users) {
            document.getElementById('usersList').innerHTML = JSON.stringify(data.users, null, 2);
        } else {
            document.getElementById('usersList').innerHTML = '⚠️ لا توجد بيانات';
        }
    }

    async function addOrUpdateBot() {
        const newUser = {
            username: document.getElementById('username').value,
            token: document.getElementById('token').value,
            owner_id: document.getElementById('owner_id').value,
            owner_name: document.getElementById('owner_name').value,
            welcome_message: document.getElementById('welcome_message').value,
            help_message: document.getElementById('help_message').value,
            is_active: true,
            max_users: 100
        };

        const res = await fetch(API_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({key: API_KEY, add_user: newUser})
        });
        const result = await res.json();
        alert(result.message || "تمت العملية");
        fetchUsers();
    }

    fetchUsers();
</script>
</body>
</html>
